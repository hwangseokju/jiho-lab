<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지호박사 과학실험실</title>
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="지호박사">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --bg2: #111827;
  --card: #1a2235;
  --card2: #1e2a40;
  --border: rgba(255,255,255,0.08);
  --text: #e8edf5;
  --muted: #7a8aaa;
  --g3: #FF6B35;
  --g4: #f59e0b;
  --g5: #06b6d4;
  --g6: #8b5cf6;
  --physics: #FF6B35;
  --chemistry: #06b6d4;
  --biology: #10b981;
  --earth: #f59e0b;
  --star: #ffd700;
  --radius: 18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Nanum Gothic',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── 별빛 배경 ── */
.stars-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(6,182,212,0.04) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(139,92,246,0.04) 0%,transparent 60%);
}

/* ── 헤더 ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,14,26,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:'Jua',cursive;
  font-size:1.3rem;
  background:linear-gradient(135deg,#FF6B35,#f59e0b,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.score-wrap{display:flex;align-items:center;gap:8px;}
.star-badge{
  background:linear-gradient(135deg,#f59e0b,#FF6B35);
  border-radius:30px;padding:4px 12px;
  font-family:'Jua',cursive;font-size:0.95rem;color:#fff;
  box-shadow:0 2px 12px rgba(245,158,11,0.3);
}

/* ── 학년 탭 ── */
.grade-tabs{
  display:flex;gap:6px;padding:14px 12px 0;
  overflow-x:auto;scrollbar-width:none;
}
.grade-tabs::-webkit-scrollbar{display:none;}
.gtab{
  flex-shrink:0;
  font-family:'Jua',cursive;font-size:0.95rem;
  padding:8px 20px;border-radius:30px;border:none;
  cursor:pointer;transition:all .2s;
  background:var(--card);color:var(--muted);
}
.gtab.g3{--gc:var(--g3);}
.gtab.g4{--gc:var(--g4);}
.gtab.g5{--gc:var(--g5);}
.gtab.g6{--gc:var(--g6);}
.gtab.active{
  background:var(--gc);color:#fff;
  box-shadow:0 4px 16px rgba(255,255,255,0.15);
  transform:translateY(-2px);
}

/* ── 메인 콘텐츠 ── */
main{position:relative;z-index:1;padding:16px 12px 80px;max-width:680px;margin:0 auto;}
.grade-section{display:none;}
.grade-section.active{display:block;}

/* ── 학년 인트로 배너 ── */
.grade-banner{
  border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;
  display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.grade-banner::before{
  content:'';position:absolute;inset:0;opacity:0.12;
  background:radial-gradient(circle at 80% 50%,white,transparent 70%);
}
.grade-banner .emoji{font-size:2.2rem;}
.grade-banner h2{font-family:'Jua',cursive;font-size:1.2rem;margin-bottom:2px;}
.grade-banner p{font-size:0.82rem;opacity:0.8;}

/* ── 단원 그리드 ── */
.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.unit-card{
  background:var(--card);border-radius:var(--radius);
  padding:14px;cursor:pointer;
  border:1.5px solid transparent;
  transition:all .2s;position:relative;overflow:hidden;
}
.unit-card:hover{transform:translateY(-3px);border-color:var(--uc);}
.unit-card.active-unit{border-color:var(--uc);background:color-mix(in srgb,var(--uc) 10%,var(--card));}
.unit-card .badge{
  display:inline-block;font-size:0.68rem;
  padding:2px 8px;border-radius:10px;margin-bottom:6px;
  background:color-mix(in srgb,var(--uc) 20%,transparent);
  color:var(--uc);font-weight:700;
}
.unit-card h4{font-family:'Jua',cursive;font-size:0.95rem;margin-bottom:2px;}
.unit-card .unit-emoji{font-size:1.6rem;float:right;margin-top:-4px;}
.unit-card p{font-size:0.75rem;color:var(--muted);line-height:1.4;}

/* ── 활동 패널 ── */
.activity-panel{
  background:var(--card);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
  animation:slideUp .3s ease;
  display:none;
}
.activity-panel.show{display:block;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.panel-title{
  font-family:'Jua',cursive;font-size:1.1rem;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}

/* ── 게임 탭 ── */
.game-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.game-tab{
  font-family:'Jua',cursive;font-size:0.82rem;
  padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
}
.game-tab.active{background:var(--uc);border-color:var(--uc);color:#fff;}

/* ── 캔버스 ── */
canvas{display:block;margin:8px auto;border-radius:12px;background:#070d18;max-width:100%;}

/* ── 퀴즈 ── */
.quiz-wrap{background:var(--card2);border-radius:14px;padding:16px;}
.quiz-q{font-family:'Jua',cursive;font-size:1rem;margin-bottom:12px;line-height:1.5;}
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{
  font-family:'Nanum Gothic',sans-serif;font-size:0.92rem;
  padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text);cursor:pointer;text-align:left;
  transition:all .15s;
}
.choice-btn:hover:not(:disabled){background:var(--card2);border-color:var(--uc);}
.choice-btn.correct{background:rgba(16,185,129,0.15);border-color:#10b981;color:#6ee7b7;}
.choice-btn.wrong{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#fca5a5;}
.quiz-result{margin-top:10px;font-family:'Jua',cursive;font-size:1rem;min-height:22px;}
.quiz-nav{display:flex;justify-content:flex-end;margin-top:10px;gap:8px;}

/* ── OX 게임 ── */
.ox-wrap{text-align:center;}
.ox-statement{
  font-family:'Jua',cursive;font-size:1.05rem;
  background:var(--card2);border-radius:12px;padding:16px;
  margin-bottom:14px;line-height:1.5;
}
.ox-btns{display:flex;gap:12px;justify-content:center;}
.ox-btn{
  font-family:'Jua',cursive;font-size:2rem;
  width:80px;height:80px;border-radius:50%;border:none;
  cursor:pointer;transition:all .2s;
}
.ox-btn.o{background:rgba(16,185,129,0.2);color:#10b981;}
.ox-btn.x{background:rgba(239,68,68,0.2);color:#ef4444;}
.ox-btn:hover{transform:scale(1.1);}
.ox-result{margin-top:12px;font-family:'Jua',cursive;font-size:1.1rem;min-height:24px;}

/* ── 빈칸 채우기 ── */
.blank-wrap{}
.blank-q{
  font-family:'Jua',cursive;font-size:1rem;
  background:var(--card2);border-radius:12px;padding:16px;
  margin-bottom:12px;line-height:1.8;
}
.blank-q .blank{
  display:inline-block;
  background:rgba(255,255,255,0.1);
  border-bottom:2px solid var(--uc);
  min-width:70px;padding:0 6px;
  border-radius:4px;text-align:center;
  color:var(--uc);font-weight:800;
}
.blank-opts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.blank-opt{
  font-family:'Jua',cursive;font-size:0.9rem;
  padding:7px 16px;border-radius:20px;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text);cursor:pointer;transition:all .15s;
}
.blank-opt:hover{border-color:var(--uc);}
.blank-opt.used{opacity:0.3;pointer-events:none;}
.blank-opt.correct-opt{background:rgba(16,185,129,0.2);border-color:#10b981;color:#6ee7b7;}
.blank-opt.wrong-opt{background:rgba(239,68,68,0.2);border-color:#ef4444;color:#fca5a5;}

/* ── 매칭 게임 ── */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.match-col{display:flex;flex-direction:column;gap:6px;}
.match-item{
  font-family:'Jua',cursive;font-size:0.85rem;
  padding:10px 12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg2);
  cursor:pointer;transition:all .15s;text-align:center;
}
.match-item:hover{border-color:var(--uc);}
.match-item.selected{border-color:var(--uc);background:color-mix(in srgb,var(--uc) 15%,var(--bg2));}
.match-item.matched{border-color:#10b981;background:rgba(16,185,129,0.15);pointer-events:none;}
.match-item.wrong-flash{border-color:#ef4444;background:rgba(239,68,68,0.15);}

/* ── 순서맞추기 ── */
.order-wrap{display:flex;flex-direction:column;gap:8px;}
.order-item{
  font-family:'Jua',cursive;font-size:0.9rem;
  padding:12px 16px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg2);
  cursor:grab;user-select:none;
  display:flex;align-items:center;gap:10px;
  transition:all .15s;
}
.order-item:hover{border-color:var(--uc);}
.order-item.dragging{opacity:0.5;border-color:var(--uc);}
.order-item .drag-handle{color:var(--muted);font-size:1.1rem;}

/* ── 버튼 ── */
.btn{
  font-family:'Jua',cursive;font-size:0.95rem;
  padding:9px 20px;border-radius:24px;border:none;
  cursor:pointer;transition:all .15s;
}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--uc);color:#fff;box-shadow:0 3px 12px rgba(255,255,255,0.1);}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border);}
.btn-sm{font-size:0.82rem;padding:6px 14px;}

/* ── 진도바 ── */
.progress-bar{
  background:var(--card2);border-radius:10px;height:8px;margin:10px 0;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,var(--uc),color-mix(in srgb,var(--uc) 60%,white));
  transition:width .4s ease;
}

/* ── 실험 슬라이더 ── */
.exp-slider-wrap{margin:8px 0;}
.exp-slider-wrap label{font-size:0.82rem;color:var(--muted);display:block;margin-bottom:4px;}
input[type=range]{width:100%;accent-color:var(--uc);margin:4px 0;}

/* ── 별 팝 ── */
.star-pop{
  position:fixed;pointer-events:none;
  font-size:1.8rem;animation:starFly .9s ease forwards;z-index:9999;
}
@keyframes starFly{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-70px) scale(1.5);}
}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--card);border:1px solid var(--border);
  border-radius:30px;padding:10px 20px;
  font-family:'Jua',cursive;font-size:0.95rem;
  z-index:9998;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1;}

/* ── 레벨 배지 ── */
.level-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.72rem;padding:3px 8px;border-radius:8px;
  background:color-mix(in srgb,var(--uc) 15%,transparent);
  color:var(--uc);font-weight:700;margin-left:6px;
}
</style>
</head>
<body>
<div class="stars-bg"></div>

<!-- 헤더 -->
<header>
  <div class="logo">🔬 지호박사</div>
  <div class="score-wrap">
    <div class="star-badge">⭐ <span id="starCount">0</span></div>
  </div>
</header>

<!-- 학년 탭 -->
<div class="grade-tabs">
  <button class="gtab g3 active" onclick="switchGrade('g3',this)">🌱 초3</button>
  <button class="gtab g4" onclick="switchGrade('g4',this)">🔥 초4</button>
  <button class="gtab g5" onclick="switchGrade('g5',this)">💡 초5</button>
  <button class="gtab g6" onclick="switchGrade('g6',this)">🚀 초6</button>
</div>

<main>

<!-- ════════════════ 초3 ════════════════ -->
<div class="grade-section active" id="sec-g3" style="--uc:var(--g3)">
  <div class="grade-banner" style="background:linear-gradient(135deg,rgba(255,107,53,0.3),rgba(255,107,53,0.05))">
    <div class="emoji">🌱</div>
    <div>
      <h2>초등 3학년 과학</h2>
      <p>힘·소리·물질·생명·지구 — 7개 단원 탐험!</p>
    </div>
  </div>

  <div class="unit-grid" id="g3-units"></div>
  <div class="activity-panel" id="g3-panel"></div>
</div>

<!-- ════════════════ 초4 ════════════════ -->
<div class="grade-section" id="sec-g4" style="--uc:var(--g4)">
  <div class="grade-banner" style="background:linear-gradient(135deg,rgba(245,158,11,0.3),rgba(245,158,11,0.05))">
    <div class="emoji">🔥</div>
    <div>
      <h2>초등 4학년 과학</h2>
      <p>자석·물·땅·생물·우주 — 7개 단원 탐험!</p>
    </div>
  </div>
  <div class="unit-grid" id="g4-units"></div>
  <div class="activity-panel" id="g4-panel"></div>
</div>

<!-- ════════════════ 초5 ════════════════ -->
<div class="grade-section" id="sec-g5" style="--uc:var(--g5)">
  <div class="grade-banner" style="background:linear-gradient(135deg,rgba(6,182,212,0.3),rgba(6,182,212,0.05))">
    <div class="emoji">💡</div>
    <div>
      <h2>초등 5학년 과학</h2>
      <p>빛·용액·몸·혼합·열 — 7개 단원 탐험!</p>
    </div>
  </div>
  <div class="unit-grid" id="g5-units"></div>
  <div class="activity-panel" id="g5-panel"></div>
</div>

<!-- ════════════════ 초6 ════════════════ -->
<div class="grade-section" id="sec-g6" style="--uc:var(--g6)">
  <div class="grade-banner" style="background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(139,92,246,0.05))">
    <div class="emoji">🚀</div>
    <div>
      <h2>초등 6학년 과학</h2>
      <p>산염기·운동·식물·지구·전기 — 7개 단원 탐험!</p>
    </div>
  </div>
  <div class="unit-grid" id="g6-units"></div>
  <div class="activity-panel" id="g6-panel"></div>
</div>

</main>

<div class="toast" id="toast"></div>

// ════════════════════════════════════
//  전역 상태
// ════════════════════════════════════
let totalStars = 0;
let currentUnit = null;
let currentGame = null;
let quizIdx = {}, oxIdx = {}, blankIdx = {}, orderIdx = {};

// ════════════════════════════════════
//  유틸
// ════════════════════════════════════
function addStar(x,y,n=1){
  totalStars += n;
  document.getElementById('starCount').textContent = totalStars;
  const el = document.createElement('div');
  el.className = 'star-pop';
  el.textContent = n>1 ? `+${n}⭐` : '⭐';
  el.style.cssText = `left:${x-20}px;top:${y-20}px;font-size:${n>1?'1.4':'1.8'}rem;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}
function showToast(msg,duration=2000){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}
function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }

// ════════════════════════════════════
//  학년 탭
// ════════════════════════════════════
function switchGrade(grade, btn){
  document.querySelectorAll('.grade-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.gtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+grade).classList.add('active');
  btn.classList.add('active');
  currentUnit = null;
}

// ════════════════════════════════════
//  단원 카드 빌드
// ════════════════════════════════════
function buildUnits(grade){
  const units = UNITS[grade];
  const grid = document.getElementById(grade+'-units');
  grid.innerHTML = '';
  units.forEach(u=>{
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.style.setProperty('--uc', u.color);
    card.innerHTML = `
      <span class="unit-emoji">${u.emoji}</span>
      <div class="badge">${u.badge}</div>
      <h4>${u.title}</h4>
      <p>${u.desc}</p>`;
    card.onclick = ()=>openUnit(grade, u, card);
    grid.appendChild(card);
  });
}

function openUnit(grade, unit, cardEl){
  document.querySelectorAll('.unit-card').forEach(c=>c.classList.remove('active-unit'));
  cardEl.classList.add('active-unit');

  const panel = document.getElementById(grade+'-panel');
  panel.style.setProperty('--uc', unit.color);
  panel.classList.add('show');
  currentUnit = unit.id;

  // 게임 탭 구성
  const gameLabels = {quiz:'📝 퀴즈',ox:'⭕❌ OX',blank:'✏️ 빈칸',match:'🔗 매칭',order:'📋 순서'};
  const availGames = unit.games.filter(g=> GAME_DATA[unit.id] && GAME_DATA[unit.id][g]);

  panel.innerHTML = `
    <div class="panel-title" style="color:var(--uc)">${unit.emoji} ${unit.title}</div>
    <div class="game-tabs">
      ${availGames.map((g,i)=>`<button class="game-tab ${i===0?'active':''}" onclick="switchGame('${unit.id}','${grade}','${g}',this)">${gameLabels[g]}</button>`).join('')}
    </div>
    <div id="game-content-${unit.id}"></div>`;

  if(availGames.length>0) renderGame(unit.id, grade, availGames[0]);

  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function switchGame(unitId, grade, game, btn){
  document.querySelectorAll('.game-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGame(unitId, grade, game);
}

// ════════════════════════════════════
//  게임 렌더
// ════════════════════════════════════
function renderGame(unitId, grade, game){
  const container = document.getElementById('game-content-'+unitId);
  const data = GAME_DATA[unitId];
  if(!data || !data[game]){ container.innerHTML='<p style="color:var(--muted);padding:12px">준비 중이에요!</p>'; return; }

  currentGame = game;
  if(game==='quiz')   renderQuiz(unitId, data.quiz, container);
  else if(game==='ox') renderOX(unitId, data.ox, container);
  else if(game==='blank') renderBlank(unitId, data.blank, container);
  else if(game==='match') renderMatch(unitId, data.match[0], container);
  else if(game==='order') renderOrder(unitId, data.order, container);
}

// ── 퀴즈 ──
function renderQuiz(uid, questions, container){
  if(!quizIdx[uid]) quizIdx[uid]=0;
  const q = questions[quizIdx[uid] % questions.length];
  const num = quizIdx[uid] % questions.length + 1;
  container.innerHTML = `
    <div class="quiz-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:0.8rem;color:var(--muted)">${num}/${questions.length}</span>
        <div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${num/questions.length*100}%"></div></div>
      </div>
      <div class="quiz-q">${q.q}</div>
      <div class="choices">
        ${q.c.map((ch,i)=>`<button class="choice-btn" onclick="pickQuiz(this,${i},${q.a},'${uid}')">${ch}</button>`).join('')}
      </div>
      <div class="quiz-result" id="qres-${uid}"></div>
      <div class="quiz-nav">
        <button class="btn btn-ghost btn-sm" onclick="quizIdx['${uid}']=(quizIdx['${uid}']-1+${questions.length})%${questions.length};renderGame('${uid}','','quiz')">◀ 이전</button>
        <button class="btn btn-primary btn-sm" onclick="quizIdx['${uid}']=(quizIdx['${uid}']+1)%${questions.length};renderGame('${uid}','','quiz')">다음 ▶</button>
      </div>
    </div>`;
}
window.pickQuiz = function(btn,chosen,ans,uid){
  const box = btn.closest('.choices');
  box.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('correct');
    else if(i===chosen&&chosen!==ans) b.classList.add('wrong');
  });
  const res = document.getElementById('qres-'+uid);
  if(chosen===ans){
    res.innerHTML='<span style="color:#6ee7b7">🎉 정답!</span>';
    addStar(btn.getBoundingClientRect().x+40, btn.getBoundingClientRect().y);
    showToast('🎉 정답이에요!');
  } else {
    res.innerHTML=`<span style="color:#fca5a5">🙁 틀렸어요!</span>`;
  }
};

// ── OX ──
function renderOX(uid, statements, container){
  if(!oxIdx[uid]) oxIdx[uid]=0;
  const s = statements[oxIdx[uid] % statements.length];
  const num = oxIdx[uid] % statements.length + 1;
  container.innerHTML = `
    <div class="ox-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:0.8rem;color:var(--muted)">${num}/${statements.length}</span>
        <div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${num/statements.length*100}%"></div></div>
      </div>
      <div class="ox-statement">${s.s}</div>
      <div class="ox-btns">
        <button class="ox-btn o" onclick="pickOX(${s.a},true,'${uid}',this)">⭕</button>
        <button class="ox-btn x" onclick="pickOX(${s.a},false,'${uid}',this)">❌</button>
      </div>
      <div class="ox-result" id="oxres-${uid}"></div>
      <div class="quiz-nav" style="margin-top:12px">
        <button class="btn btn-ghost btn-sm" onclick="oxIdx['${uid}']=(oxIdx['${uid}']-1+${statements.length})%${statements.length};renderGame('${uid}','','ox')">◀ 이전</button>
        <button class="btn btn-primary btn-sm" onclick="oxIdx['${uid}']=(oxIdx['${uid}']+1)%${statements.length};renderGame('${uid}','','ox')">다음 ▶</button>
      </div>
    </div>`;
}
window.pickOX = function(correct, chosen, uid, btn){
  document.querySelectorAll('.ox-btn').forEach(b=>b.disabled=true);
  const res = document.getElementById('oxres-'+uid);
  if(chosen===correct){
    res.innerHTML='<span style="color:#6ee7b7">🎉 정답!</span>';
    addStar(btn.getBoundingClientRect().x+40, btn.getBoundingClientRect().y);
    showToast('🎉 정답이에요!');
  } else {
    res.innerHTML=`<span style="color:#fca5a5">🙁 틀렸어요! 정답은 ${correct?'⭕':'❌'}</span>`;
  }
};

// ── 빈칸 채우기 ──
function renderBlank(uid, blanks, container){
  if(!blankIdx[uid]) blankIdx[uid]=0;
  const b = blanks[blankIdx[uid] % blanks.length];
  const num = blankIdx[uid] % blanks.length + 1;
  const qHtml = b.q.replace('[?]', `<span class="blank" id="blank-ans-${uid}">　　　</span>`);
  const shuffledOpts = shuffle(b.opts);
  container.innerHTML = `
    <div class="blank-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:0.8rem;color:var(--muted)">${num}/${blanks.length}</span>
        <div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${num/blanks.length*100}%"></div></div>
      </div>
      <div class="blank-q">${qHtml}</div>
      <div class="blank-opts">
        ${shuffledOpts.map(o=>`<button class="blank-opt" onclick="pickBlank(this,'${o}','${b.a}','${uid}')">${o}</button>`).join('')}
      </div>
      <div class="quiz-result" id="bres-${uid}"></div>
      <div class="quiz-nav">
        <button class="btn btn-ghost btn-sm" onclick="blankIdx['${uid}']=(blankIdx['${uid}']-1+${blanks.length})%${blanks.length};renderGame('${uid}','','blank')">◀ 이전</button>
        <button class="btn btn-primary btn-sm" onclick="blankIdx['${uid}']=(blankIdx['${uid}']+1)%${blanks.length};renderGame('${uid}','','blank')">다음 ▶</button>
      </div>
    </div>`;
}
window.pickBlank = function(btn, chosen, ans, uid){
  document.querySelectorAll('.blank-opt').forEach(b=>b.disabled=true);
  const blankEl = document.getElementById('blank-ans-'+uid);
  const res = document.getElementById('bres-'+uid);
  blankEl.textContent = chosen;
  if(chosen===ans){
    btn.classList.add('correct-opt');
    blankEl.style.color='#6ee7b7';
    res.innerHTML='<span style="color:#6ee7b7">🎉 정답!</span>';
    addStar(btn.getBoundingClientRect().x+40, btn.getBoundingClientRect().y);
    showToast('🎉 정답이에요!');
  } else {
    btn.classList.add('wrong-opt');
    blankEl.style.color='#fca5a5';
    res.innerHTML=`<span style="color:#fca5a5">🙁 틀렸어요! 정답: <b style="color:#6ee7b7">${ans}</b></span>`;
  }
};

// ── 매칭 ──
function renderMatch(uid, matchData, container){
  const leftItems = matchData.left;
  const rightItems = shuffle([...matchData.right]);
  const rightOriginal = matchData.right;
  const pairs = matchData.pairs;
  let selected = null;
  let selectedSide = null;
  let matched = new Set();

  const rightMap = {};
  rightItems.forEach((r,i)=> rightMap[r] = rightOriginal.indexOf(r));

  container.innerHTML = `
    <div style="font-size:0.82rem;color:var(--muted);margin-bottom:10px">👆 왼쪽과 오른쪽을 연결해봐요!</div>
    <div class="match-wrap">
      <div class="match-col" id="match-left-${uid}">
        ${leftItems.map((l,i)=>`<div class="match-item" data-idx="${i}" data-side="left" onclick="matchClick(this,'${uid}')">${l}</div>`).join('')}
      </div>
      <div class="match-col" id="match-right-${uid}">
        ${rightItems.map((r,i)=>`<div class="match-item" data-val="${r}" data-ridx="${rightMap[r]}" data-side="right" onclick="matchClick(this,'${uid}')">${r}</div>`).join('')}
      </div>
    </div>
    <div class="quiz-result" id="mres-${uid}" style="margin-top:10px"></div>
    <div class="quiz-nav">
      <button class="btn btn-ghost btn-sm" onclick="renderGame('${uid}','','match')">🔄 다시하기</button>
    </div>`;

  window._matchState = window._matchState || {};
  window._matchState[uid] = {selected:null,selectedSide:null,matched:new Set(),pairs,leftItems,rightMap,total:leftItems.length,score:0};
}
window.matchClick = function(el, uid){
  const state = window._matchState[uid];
  if(el.classList.contains('matched')) return;
  const side = el.dataset.side;

  if(!state.selected){
    state.selected = el;
    state.selectedSide = side;
    el.classList.add('selected');
    return;
  }

  if(state.selectedSide === side){
    state.selected.classList.remove('selected');
    state.selected = el;
    el.classList.add('selected');
    return;
  }

  // 매칭 시도
  let leftEl, rightEl;
  if(side==='right'){ leftEl=state.selected; rightEl=el; }
  else { leftEl=el; rightEl=state.selected; }

  const lIdx = parseInt(leftEl.dataset.idx);
  const rIdx = parseInt(rightEl.dataset.ridx);
  const correctRIdx = state.pairs[lIdx];

  if(rIdx === correctRIdx){
    leftEl.classList.remove('selected'); leftEl.classList.add('matched');
    rightEl.classList.remove('selected'); rightEl.classList.add('matched');
    state.score++;
    addStar(rightEl.getBoundingClientRect().x+30, rightEl.getBoundingClientRect().y);
    if(state.score >= state.total){
      document.getElementById('mres-'+uid).innerHTML='<span style="color:#6ee7b7">🎉 모두 연결했어요!</span>';
      showToast('🎊 완벽해요!');
    }
  } else {
    leftEl.classList.add('wrong-flash'); rightEl.classList.add('wrong-flash');
    setTimeout(()=>{
      leftEl.classList.remove('wrong-flash','selected');
      rightEl.classList.remove('wrong-flash','selected');
    },600);
  }
  state.selected = null; state.selectedSide = null;
};

// ── 순서 맞추기 ──
function renderOrder(uid, orders, container){
  if(!orderIdx[uid]) orderIdx[uid]=0;
  const od = orders[orderIdx[uid] % orders.length];
  const shuffled = shuffle(od.items.map((item,i)=>({item,origIdx:i})));

  container.innerHTML = `
    <div style="font-family:'Jua',cursive;font-size:0.95rem;margin-bottom:10px">${od.title}</div>
    <div class="order-wrap" id="order-list-${uid}">
      ${shuffled.map((o,i)=>`
        <div class="order-item" draggable="true" data-orig="${o.origIdx}" 
             ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dragDrop(event,'${uid}')">
          <span class="drag-handle">☰</span>
          <span>${o.item}</span>
        </div>`).join('')}
    </div>
    <div class="quiz-nav" style="margin-top:10px">
      <button class="btn btn-ghost btn-sm" onclick="renderGame('${uid}','','order')">🔄 섞기</button>
      <button class="btn btn-primary btn-sm" onclick="checkOrder('${uid}',${JSON.stringify(od.correct)})">✅ 확인!</button>
    </div>
    <div class="quiz-result" id="ores-${uid}" style="margin-top:8px"></div>`;
}
let dragSrc = null;
window.dragStart = function(e){ dragSrc=e.target; e.dataTransfer.effectAllowed='move'; };
window.dragOver = function(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; };
window.dragDrop = function(e, uid){
  e.stopPropagation();
  if(dragSrc !== e.currentTarget){
    const list = document.getElementById('order-list-'+uid);
    const items = [...list.querySelectorAll('.order-item')];
    const fromIdx = items.indexOf(dragSrc);
    const toIdx = items.indexOf(e.currentTarget);
    if(fromIdx<toIdx) list.insertBefore(dragSrc, e.currentTarget.nextSibling);
    else list.insertBefore(dragSrc, e.currentTarget);
  }
};
window.checkOrder = function(uid, correct){
  const list = document.getElementById('order-list-'+uid);
  const items = [...list.querySelectorAll('.order-item')];
  const userOrder = items.map(el=>parseInt(el.dataset.orig));
  const isCorrect = correct.every((c,i)=>c===userOrder[i]);
  const res = document.getElementById('ores-'+uid);
  if(isCorrect){
    res.innerHTML='<span style="color:#6ee7b7">🎉 순서가 맞아요!</span>';
    addStar(list.getBoundingClientRect().x+100, list.getBoundingClientRect().y);
    showToast('🎊 완벽한 순서예요!');
  } else {
    res.innerHTML='<span style="color:#fca5a5">🙁 순서가 틀렸어요. 다시 해봐요!</span>';
  }
};
